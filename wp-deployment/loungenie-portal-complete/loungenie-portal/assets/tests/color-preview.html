<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LounGenie Color Preview</title>
    <link rel="stylesheet" href="../css/design-tokens.css">
    <link rel="stylesheet" href="../css/portal.css">
</head>

<body class="lgp-bg-soft">
    <header class="lgp-header">
        <div class="lgp-logo"><span class="lgp-text-inverse">LounGenie</span> <span class="lgp-logo-separator">|</span>
            <span class="lgp-text-inverse">Pool Safe Inc.</span></div>
        <div class="lgp-header-actions">
            <a class="lgp-btn lgp-btn-secondary" href="#">Help</a>
            <a class="lgp-btn lgp-btn-primary" href="#">Primary CTA</a>
        </div>
    </header>
    <aside class="lgp-sidebar" style="margin-top:64px;">
        <a class="lgp-nav-link active" href="#"><span class="lgp-nav-icon">🏠</span>Dashboard</a>
        <a class="lgp-nav-link" href="#"><span class="lgp-nav-icon">🧰</span>Units</a>
        <a class="lgp-nav-link" href="#"><span class="lgp-nav-icon">🎫</span>Tickets</a>
    </aside>
    <main class="lgp-main">
        <section class="lgp-card">
            <div class="lgp-card-header">
                <div class="lgp-card-header-left">
                    <div class="lgp-card-icon">ℹ️</div>
                    <h3 class="lgp-card-title">Card Title</h3>
                </div>
            </div>
            <div class="lgp-card-body">This card uses the tokenized color system.</div>
            <div class="lgp-card-footer">
                <a class="lgp-btn lgp-btn-secondary" href="#">Secondary</a>
                <a class="lgp-btn lgp-btn-primary" href="#">Primary</a>
            </div>
        </section>
        <div class="lgp-divider"></div>
        <div class="lgp-table-wrapper lgp-max-h-400">
            <table class="lgp-table">
                <thead>
                    <tr>
                        <th>Header</th>
                        <th>Header</th>
                        <th class="lgp-table-numeric">#</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Row Item</td>
                        <td>Row Item</td>
                        <td class="lgp-table-numeric">42</td>
                    </tr>
                    <tr>
                        <td>Row Item</td>
                        <td>Row Item</td>
                        <td class="lgp-table-numeric">13</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>

</html>
