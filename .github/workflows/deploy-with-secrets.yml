name: Deploy LG9 to Staging (with secrets)


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      run_full_deploy:
        description: "Set to true to run upload + notify (default: true)"
        required: false
        default: "true"

jobs:
  deploy:
    name: Deploy plugin to staging (secret-backed)
    runs-on: windows-latest
    # Secrets are exported in a guarded runtime step below to avoid
    # workflow compile-time context access errors.

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Export secrets to env (guarded)
        if: github.event.inputs.run_full_deploy == 'true'
        shell: pwsh
        run: |
          # Use only at runtime; export secrets mapping that accepts alternate secret names users may have set
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            # cPanel token: CPANEL_TOKEN or CPANEL_API_TOKEN
            if ('${{ secrets.CPANEL_TOKEN }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "CPANEL_TOKEN=${{ secrets.CPANEL_TOKEN }}" }
            elseif ('${{ secrets.CPANEL_API_TOKEN }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "CPANEL_TOKEN=${{ secrets.CPANEL_API_TOKEN }}" }

            # FTP host/user/pass: prefer canonical names, fall back to common variants
            if ('${{ secrets.FTP_HOST }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "FTP_HOST=${{ secrets.FTP_HOST }}" }
            if ('${{ secrets.FTP_USER }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "FTP_USER=${{ secrets.FTP_USER }}" }
            elseif ('${{ secrets.FTP_USERNAME }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "FTP_USER=${{ secrets.FTP_USERNAME }}" }
            if ('${{ secrets.FTP_PASS }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "FTP_PASS=${{ secrets.FTP_PASS }}" }
            elseif ('${{ secrets.FTP_PASSWORD }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "FTP_PASS=${{ secrets.FTP_PASSWORD }}" }

            # WP REST user/pass: support both naming conventions
            if ('${{ secrets.WP_REST_USER }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "WP_REST_USER=${{ secrets.WP_REST_USER }}" }
            elseif ('${{ secrets.WP_REST_USERNAME }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "WP_REST_USER=${{ secrets.WP_REST_USERNAME }}" }
            if ('${{ secrets.WP_REST_PASS }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "WP_REST_PASS=${{ secrets.WP_REST_PASS }}" }
            elseif ('${{ secrets.WP_REST_PASSWORD }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "WP_REST_PASS=${{ secrets.WP_REST_PASSWORD }}" }

            # WP site URL (optional)
            if ('${{ secrets.WP_SITE_URL }}' -ne '') { Add-Content -Path $env:GITHUB_ENV -Value "WP_SITE_URL=${{ secrets.WP_SITE_URL }}" }
          } else {
            Write-Host 'Skipping secret export: not a workflow_dispatch event.'
          }

      - name: Verify artifact exists
        shell: pwsh
        run: |
          if (-not (Test-Path -Path .\dist\lg-block-patterns.zip)) { Write-Host 'dist/lg-block-patterns.zip not found'; exit 1 }

      - name: Upload plugin via cPanel helper
        if: ${{ github.event.inputs.run_full_deploy == 'true' }}
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\upload_plugin_via_cpanel.ps1 .\dist\lg-block-patterns.zip '/public_html/staging_loungenie/wp-content/plugins'

      - name: Notify LiteSpeed and run smoke checks
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\notify_litespeed_and_check.ps1

      - name: Run page audit (quick)
        shell: pwsh
        run: |
          python tools/page_audit.py --iterations 30 --urls "$env:WP_SITE_URL/stage/"
