name: LounGenie Portal Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-validation:
    name: PHP Validation & Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          coverage: none
      - run: find loungenie-portal -name "*.php" -type f -exec php -l {} \;
      - run: |
          test -f loungenie-portal/loungenie-portal.php
          test -d loungenie-portal/includes
          test -d loungenie-portal/templates
          test -d loungenie-portal/assets
          test -d loungenie-portal/api

  composer-setup:
    name: Composer Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          tools: composer:2.9.2
      - name: Install Dependencies
        run: |
          cd loungenie-portal
          composer install --no-interaction --prefer-dist
      - name: Cache Vendor
        uses: actions/cache@v3
        with:
          path: loungenie-portal/vendor
          key: composer-${{ hashFiles('loungenie-portal/composer.lock') }}

  phpunit-tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: composer-setup
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          tools: composer:2.9.2
      - run: |
          cd loungenie-portal
          composer install --no-interaction
          vendor/bin/phpunit --colors=always

  code-standards:
    name: Coding Standards
    runs-on: ubuntu-latest
    needs: composer-setup
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          tools: composer:2.9.2
      - run: |
          cd loungenie-portal
          composer install --no-interaction
          vendor/bin/phpcs --standard=WordPress --colors

  security-checks:
    name: Security Checks (Pattern-Based)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # SQL Injection check
          ! grep -r "->query(" loungenie-portal --include="*.php" | grep -v "prepare" || echo "⚠ Warning: SQL injection patterns found"
          # XSS check
          ! grep -r "echo \$_" loungenie-portal --include="*.php" | grep -v "esc_" || echo "⚠ Warning: Unescaped output found"

  build-artifact:
    name: Build & Generate Artifact
    runs-on: ubuntu-latest
    needs: [php-validation, phpunit-tests, code-standards, security-checks]
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd loungenie-portal
          zip -r ../loungenie-portal-plugin.zip . -x "*.git*" -x "*.DS_Store" -x "tests/*" -x "*.md" -x "vendor/*" -x "phpunit.xml" -x "phpcs.xml" -x "composer.*"
      - uses: actions/upload-artifact@v3
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
          ls -lh loungenie-portal-plugin.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
