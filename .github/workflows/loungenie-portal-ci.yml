name: LounGenie Portal E2E CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  php-validation:
    name: PHP Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          coverage: none

      - name: Check PHP Syntax
        run: |
          echo "Checking PHP syntax..."
          find loungenie-portal -name "*.php" -type f -exec php -l {} \;
          echo "✅ PHP syntax valid"

      - name: Validate Plugin Structure
        run: |
          echo "Validating plugin structure..."
          test -f loungenie-portal/loungenie-portal.php || exit 1
          test -d loungenie-portal/includes || exit 1
          test -d loungenie-portal/templates || exit 1
          test -d loungenie-portal/assets || exit 1
          test -f loungenie-portal/assets/css/portal.css || exit 1
          test -f loungenie-portal/assets/js/portal.js || exit 1
          echo "✅ Plugin structure valid"

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Check for SQL Injection Risks
        run: |
          echo "Scanning for SQL injection patterns..."
          ! grep -r "->query(" loungenie-portal --include="*.php" | grep -v "prepare" | grep -v "//" || echo "⚠ Warning: Found potential SQL injection patterns"
          echo "✅ SQL injection check complete"

      - name: Check for XSS Risks
        run: |
          echo "Scanning for XSS patterns..."
          ! grep -r "echo \$_" loungenie-portal --include="*.php" | grep -v "esc_" || echo "⚠ Warning: Found unescaped output"
          echo "✅ XSS check complete"

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [php-validation, security-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          cd loungenie-portal
          zip -r ../loungenie-portal-plugin.zip .
          cd ..
          ls -lh loungenie-portal-plugin.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
