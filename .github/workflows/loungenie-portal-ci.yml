name: LounGenie Portal E2E CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  php-validation:
    name: PHP Validation & Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          coverage: none
      - run: find loungenie-portal -name "*.php" -type f -exec php -l {} \;
      - run: |
          test -f loungenie-portal/loungenie-portal.php
          test -d loungenie-portal/includes
          test -d loungenie-portal/templates
          test -d loungenie-portal/assets
          test -d loungenie-portal/api

  security-checks:
    name: Security Checks (Pattern-Based)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # SQL Injection check
          ! grep -r "->query(" loungenie-portal --include="*.php" | grep -v "prepare" || echo "⚠ Warning: SQL injection patterns found"
          # XSS check
          ! grep -r "echo \$_" loungenie-portal --include="*.php" | grep -v "esc_" || echo "⚠ Warning: Unescaped output found"

  build-artifact:
    name: Build & Generate Artifact
    runs-on: ubuntu-latest
    needs: [php-validation, security-checks]
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd loungenie-portal
          zip -r ../loungenie-portal-plugin.zip . -x "*.git*" -x "*.DS_Store" -x "tests/*" -x "*.md"
      - uses: actions/upload-artifact@v3
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
          ls -lh loungenie-portal-plugin.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
