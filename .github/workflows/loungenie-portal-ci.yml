name: LounGenie Portal E2E CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  php-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          tools: composer:2.9.2
      - name: Check PHP Syntax
        run: find loungenie-portal -name "*.php" -type f -exec php -l {} \;

  composer-setup:
    runs-on: ubuntu-latest
    needs: php-validation
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          tools: composer:2.9.2
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

  phpunit-tests:
    runs-on: ubuntu-latest
    needs: composer-setup
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit -c loungenie-portal/phpunit.xml

  code-standards:
    runs-on: ubuntu-latest
    needs: composer-setup
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=loungenie-portal/phpcs.xml loungenie-portal/

  security-checks:
    runs-on: ubuntu-latest
    needs: [php-validation]
    steps:
      - uses: actions/checkout@v4
      - name: Scan for SQL injection patterns
        run: |
          ! grep -r "->query(" loungenie-portal --include="*.php" | grep -v "prepare" || echo "⚠ SQL injection warning"
      - name: Scan for XSS patterns
        run: |
          ! grep -r "echo \$_" loungenie-portal --include="*.php" | grep -v "esc_" || echo "⚠ XSS warning"

  build-artifact:
    runs-on: ubuntu-latest
    needs: [phpunit-tests, code-standards, security-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Generate Deployment Package
        run: |
          cd loungenie-portal
          zip -r ../loungenie-portal-plugin.zip . -x "vendor/*" -x "tests/*" -x "*.git*" -x "*.md"
          cd ..
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
          ls -lh loungenie-portal-plugin.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30
