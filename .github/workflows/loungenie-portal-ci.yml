name: LounGenie Portal E2E CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  id-token: write

jobs:
  setup-environment:
    name: Setup Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
          coverage: none
          tools: composer:2.9.2

      - name: Cache Composer Dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer Dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Install NPM Dependencies
        run: npm ci

  phpstan:
    name: PHPStan Static Analysis
    runs-on: ubuntu-latest
    needs: setup-environment
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.0.30
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --level=5 loungenie-portal/includes

  security-checks:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    needs: setup-environment
    steps:
      - uses: actions/checkout@v4

      - name: NPM Audit
        run: npm audit --audit-level=high || true

      - name: Run JavaScript CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  build-and-artifacts:
    name: Build & Generate Artifacts
    runs-on: ubuntu-latest
    needs: [setup-environment, phpstan, security-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Assets
        run: npm run build

      - name: Generate Deployment Artifact
        run: zip -r loungenie-portal-plugin.zip . -x node_modules/*** vendor/***

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: loungenie-portal-plugin
          path: loungenie-portal-plugin.zip
          retention-days: 30

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [setup-environment, phpstan, security-checks, build-and-artifacts]
    steps:
      - name: Generate Summary
        run: |
          echo "LounGenie Portal E2E CI completed successfully!"
          echo "✅ Node.js: 24.11.1"
          echo "✅ PHP: 8.0.30"
          echo "✅ Composer: 2.9.2"
          echo "✅ PHPStan: level 5"
          echo "✅ JavaScript CodeQL scan complete"
          echo "✅ NPM Audit done (high vulnerabilities flagged)"
          echo "✅ Artifact loungenie-portal-plugin.zip uploaded"
