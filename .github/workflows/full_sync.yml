name: Full Staging Sync

on:
  workflow_dispatch:
    inputs:
      allow_live:
        description: "When true and secrets exist, enable live writes"
        required: false
        default: "false"
      run_ftp_backup:
        description: "Run FTP backup step"
        required: false
        default: "true"
  push:
    branches:
      - feature/staging-deploy
  schedule:
    - cron: "0 3 * * 0"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Determine mode
        id: mode
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          ALLOW_LIVE: ${{ github.event.inputs.allow_live || 'false' }}
        run: |
          MISSING=0
          for v in WP_URL WP_USER WP_APP_PASS FTP_HOST FTP_USER FTP_PASS; do
            if [ -z "${!v}" ]; then
              echo "Secret $v is missing"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -eq 0 ] && [ "${ALLOW_LIVE}" = 'true' ]; then
            echo "live=true" >> $GITHUB_OUTPUT
          else
            echo "live=false" >> $GITHUB_OUTPUT
          fi

      - name: Run orchestrator
        shell: bash
        env:
          RUN_FTP_BACKUP: ${{ github.event.inputs.run_ftp_backup }}
        run: |
          if [ "${{ steps.mode.outputs.live }}" = "true" ]; then
            echo "Running LIVE orchestrator (writes enabled)"
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_wp_ftp_and_rest_safe.ps1 -Live
          else
            echo "Running dry-run orchestrator (no writes)"
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_everything_local.ps1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-artifacts
          path: |
            artifacts/**

      - name: Commit artifacts branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="audit/artifacts-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git add artifacts || true
          git commit -m "chore(audit): add automated artifacts" || echo "No changes to commit"
          git push --set-upstream origin "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open artifacts PR
        if: always()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "audit/artifacts-${{ github.run_id }}"
          title: "Automated audit artifacts"
          body: |
            This PR contains automated audit artifacts and suggested remediation payloads generated by the repository orchestrator. Review artifacts and apply selectively.
          labels: automated,audit
