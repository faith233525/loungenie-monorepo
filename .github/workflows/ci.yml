name: LounGenie Portal CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.0' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: loungenie-portal/vendor
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('loungenie-portal/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-${{ matrix.php }}-
      - name: Install dependencies
        working-directory: loungenie-portal
        run: composer install --no-progress --prefer-dist --no-interaction
      - name: Run tests
        working-directory: loungenie-portal
        run: composer run test

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer
      - name: Install dependencies
        working-directory: loungenie-portal
        run: composer install --no-progress --prefer-dist --no-interaction
      - name: Run PHPCS (non-blocking)
        working-directory: loungenie-portal
        run: composer run cs || true
      - name: Save PHPCS summary
        if: always()
        working-directory: loungenie-portal
        run: |
          mkdir -p artifacts
          vendor/bin/phpcs -d memory_limit=512M -q -s --report=summary includes api templates *.php > artifacts/phpcs-summary.txt || true
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-summary
          path: loungenie-portal/artifacts/phpcs-summary.txt