name: Auto Deploy LG9 to Staging

on:
  push:
    branches: ["deploy-staging"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy plugin to staging
    runs-on: windows-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
      WP_REST_USER: ${{ secrets.WP_REST_USER }}
      WP_REST_PASS: ${{ secrets.WP_REST_PASS }}
      WP_SITE_URL: ${{ secrets.WP_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Verify artifact exists
        run: |
          if (-not (Test-Path -Path .\dist\lg-block-patterns.zip)) { Write-Host 'dist/lg-block-patterns.zip not found'; exit 1 }
        shell: pwsh

      - name: Upload plugin via existing script
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\upload_plugin_via_cpanel.ps1 .\dist\lg-block-patterns.zip '/public_html/staging_loungenie/wp-content/plugins'
        shell: pwsh

      - name: Notify LiteSpeed and run smoke checks
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\notify_litespeed_and_check.ps1
        shell: pwsh

      - name: Run page audit (quick)
        run: python tools/page_audit.py --iterations 20 --urls ${{ env.WP_SITE_URL }}/stage/
