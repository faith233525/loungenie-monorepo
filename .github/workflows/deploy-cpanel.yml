name: Deploy to cPanel (Git Pull)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      repo:
        description: 'cPanel repo name (overrides CPANEL_REPO secret)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  git-pull:
    name: Trigger cPanel Git Pull
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Pull
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          # Canonical hostname — used automatically when CPANEL_HOST contains a bare IP
          CPANEL_HOSTNAME: cpanel.loungenie.com
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_REPO: ${{ secrets.CPANEL_REPO }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
        run: |
          set -euo pipefail

          REPO="${INPUT_REPO:-${CPANEL_REPO}}"
          if [ -z "$REPO" ]; then
            echo "No repo specified (set CPANEL_REPO secret or pass repo input)." >&2
            exit 1
          fi

          # Normalise host: if the secret is a bare IPv4 address the TLS cert will
          # not match — use the known hostname instead to avoid curl exit code 60.
          HOST="$CPANEL_HOST"
          if echo "$HOST" | grep -qE '^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$'; then
            echo "Warning: CPANEL_HOST is an IP ($HOST); using $CPANEL_HOSTNAME for SSL." >&2
            HOST="$CPANEL_HOSTNAME"
          fi

          URL="https://${HOST}:2083/execute/Git/update_repo?repo=${REPO}"
          echo "Triggering Git pull for repo '${REPO}' on ${HOST}"

          HTTP=$(curl -s -w "%{http_code}" -o deploy.json -X POST "$URL" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $HTTP"
          echo "cPanel response (first 500 chars):"
          head -c 500 deploy.json || true

          if [ "$HTTP" -ge 400 ]; then
            echo "cPanel API returned error status $HTTP" >&2
            exit 1
          fi

      - name: Upload deploy response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-deploy-response
          path: deploy.json

  post-deploy-check:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: [git-pull]
    if: always()
    steps:
      - name: HTTP smoke check
        run: |
          URL="${{ secrets.STAGING_URL }}"
          if [ -z "$URL" ]; then
            echo "No STAGING_URL secret set; skipping smoke check."
            exit 0
          fi
          echo "Checking $URL"
          curl -fsSI "$URL" | head -n 10
