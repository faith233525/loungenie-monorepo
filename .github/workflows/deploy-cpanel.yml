name: Deploy to cPanel (SSH then FTP fallback)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

permissions:
  contents: read

jobs:
  deploy-ssh:
    name: Deploy via SSH (if key provided)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Select target vars
        id: target
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "HOST=${{ secrets.PRODUCTION_HOST }}" >> $GITHUB_OUTPUT
            echo "USER=${{ secrets.PRODUCTION_USER }}" >> $GITHUB_OUTPUT
            echo "KEY=${{ secrets.PRODUCTION_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "PATH=${{ secrets.PRODUCTION_PATH }}" >> $GITHUB_OUTPUT
          else
            echo "HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_OUTPUT
            echo "USER=${{ secrets.STAGING_USER }}" >> $GITHUB_OUTPUT
            echo "KEY=${{ secrets.STAGING_SSH_KEY }}" >> $GITHUB_OUTPUT
            echo "PATH=${{ secrets.STAGING_PATH }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare SSH key
        if: env.DEPLOY_KEY != ''
        env:
          DEPLOY_KEY: ${{ steps.target.outputs.KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ steps.target.outputs.HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync files to server
        if: env.DEPLOY_KEY != ''
        env:
          HOST: ${{ steps.target.outputs.HOST }}
          USER: ${{ steps.target.outputs.USER }}
          PATH_ON_SERVER: ${{ steps.target.outputs.PATH }}
          DEPLOY_KEY: ${{ steps.target.outputs.KEY }}
        run: |
          ARTIFACT_DIR=.
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" "$ARTIFACT_DIR/" "$USER@$HOST:$PATH_ON_SERVER/"

      - name: Cleanup key
        if: env.DEPLOY_KEY != ''
        run: |
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key || true

  deploy-ftp:
    name: Deploy via FTP (fallback)
    runs-on: ubuntu-latest
    needs: [deploy-ssh]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Deploy with FTP action
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
        if: env.FTP_HOST != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USER }}
          password: ${{ env.FTP_PASS }}
          server-dir: ${{ env.STAGING_PATH }}
          local-dir: .

  post-deploy-check:
    name: Post-deploy smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-ssh, deploy-ftp]
    steps:
      - name: Quick HTTP check
        run: |
          URL=${{ secrets.STAGING_URL }}
          if [ -z "$URL" ]; then
            echo "No STAGING_URL secret set; skipping HTTP check";
            exit 0
          fi
          echo "Checking $URL"
          curl -I -s "$URL" | head -n 5
