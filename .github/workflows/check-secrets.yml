name: Check Repository & Action Secrets

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/check-secrets.yml'

permissions: {}

jobs:
  check-secrets:
    name: Validate Repository Secrets
    runs-on: ubuntu-latest
    env:
      # FTP / SFTP secrets (update-pages)
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      # WordPress REST API secrets (update-pages)
      WP_URL: ${{ secrets.WP_URL }}
      WP_USER: ${{ secrets.WP_USER }}
      WP_PASS: ${{ secrets.WP_PASS }}
      WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
      STAGING_URL: ${{ secrets.STAGING_URL }}
      # Portal staging secrets
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      STAGING_PATH: ${{ secrets.STAGING_PATH }}
      STAGING_API_TOKEN: ${{ secrets.STAGING_API_TOKEN }}
      # Portal production secrets
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
      PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
      PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH }}
      PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
      # WordPress.org deploy secrets (portal)
      SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
      SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

    steps:
      - name: Check secrets
        id: check
        shell: bash
        run: |
          MISSING=0
          PRESENT=0

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "❌ MISSING : $name"
              MISSING=$((MISSING + 1))
            else
              echo "✅ PRESENT : $name"
              PRESENT=$((PRESENT + 1))
            fi
          }

          echo "=== FTP / SFTP secrets (update-pages) ==="
          check_secret "FTP_HOST"     "$FTP_HOST"
          check_secret "FTP_USER"     "$FTP_USER"
          check_secret "FTP_PASS"     "$FTP_PASS"
          check_secret "FTP_USERNAME" "$FTP_USERNAME"
          check_secret "FTP_PASSWORD" "$FTP_PASSWORD"

          echo ""
          echo "=== WordPress REST API secrets (update-pages) ==="
          check_secret "WP_URL"      "$WP_URL"
          check_secret "WP_USER"     "$WP_USER"
          check_secret "WP_PASS"     "$WP_PASS"
          check_secret "WP_APP_PASS" "$WP_APP_PASS"
          check_secret "STAGING_URL" "$STAGING_URL"

          echo ""
          echo "=== Portal staging secrets ==="
          check_secret "STAGING_HOST"      "$STAGING_HOST"
          check_secret "STAGING_USER"      "$STAGING_USER"
          check_secret "STAGING_SSH_KEY"   "$STAGING_SSH_KEY"
          check_secret "STAGING_PATH"      "$STAGING_PATH"
          check_secret "STAGING_API_TOKEN" "$STAGING_API_TOKEN"

          echo ""
          echo "=== Portal production secrets ==="
          check_secret "PRODUCTION_HOST"    "$PRODUCTION_HOST"
          check_secret "PRODUCTION_USER"    "$PRODUCTION_USER"
          check_secret "PRODUCTION_SSH_KEY" "$PRODUCTION_SSH_KEY"
          check_secret "PRODUCTION_PATH"    "$PRODUCTION_PATH"
          check_secret "PRODUCTION_URL"     "$PRODUCTION_URL"

          echo ""
          echo "=== WordPress.org deploy secrets (portal) ==="
          check_secret "SVN_USERNAME" "$SVN_USERNAME"
          check_secret "SVN_PASSWORD" "$SVN_PASSWORD"

          echo ""
          echo "================================================"
          echo "  Present : $PRESENT"
          echo "  Missing : $MISSING"
          echo "================================================"

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "⚠️  $MISSING secret(s) are not configured."
            echo "   Add them under: Settings → Secrets and variables → Actions"
            echo "   Refer to update-pages/README-secrets.md for details."
            # Report status but do not fail the workflow so the summary is always visible.
            echo "has_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "🎉 All secrets are configured."
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.check.outputs.has_missing }}" = "true" ]; then
            echo "### ⚠️ Secrets check: some secrets are missing" >> "$GITHUB_STEP_SUMMARY"
            echo "See the step log above for the full list." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Add missing secrets under **Settings → Secrets and variables → Actions**." >> "$GITHUB_STEP_SUMMARY"
            echo "Refer to \`update-pages/README-secrets.md\` for the required secret names." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ✅ Secrets check passed — all secrets are configured" >> "$GITHUB_STEP_SUMMARY"
          fi
