name: Deploy Portal to Staging (FTP) [standalone]

# Standalone FTP-only workflow — kept for manual use.
# The master deployment workflow (deploy-cpanel.yml) now handles
# FTP sync automatically on every push to main.

on:
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Make deploy script executable
        run: chmod +x scripts/deploy_via_lftp.sh

      - name: Run deploy script
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          REMOTE_BASE: "/public_html/stage"
        run: |
          ./scripts/deploy_via_lftp.sh
