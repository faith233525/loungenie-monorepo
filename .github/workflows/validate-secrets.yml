name: Validate Repository Secrets

on:
  workflow_dispatch:
    inputs:
      extra_secrets:
        description: "Comma-separated additional secret names to check"
        required: false
        default: ""
      fail_on_missing:
        description: "Fail the job if any secret is missing (true/false)"
        required: false
        default: "false"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Check secrets (no values printed)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_WP_URL: ${{ secrets.STAGING_WP_URL }}
          STAGING_WP_USER: ${{ secrets.STAGING_WP_USER }}
          STAGING_WP_APP_PASSWORD: ${{ secrets.STAGING_WP_APP_PASSWORD }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_PATH: ${{ secrets.PRODUCTION_PATH }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REPO: ${{ secrets.CPANEL_REPO }}
          WP_REST_USER: ${{ secrets.WP_REST_USER }}
          WP_REST_USERNAME: ${{ secrets.WP_REST_USERNAME }}
          WP_REST_PASS: ${{ secrets.WP_REST_PASS }}
          WP_REST_PASSWORD: ${{ secrets.WP_REST_PASSWORD }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          EXTRA_SECRETS: ${{ github.event.inputs.extra_secrets }}
          FAIL_ON_MISSING: ${{ github.event.inputs.fail_on_missing }}
        run: |
          set -euo pipefail
          missing=0
          mkdir -p artifacts
          echo "Secret check run: $(date -u)" > artifacts/secret-check.txt

          # Core WordPress REST secrets
          known=(WP_URL WP_USER WP_APP_PASS)
          # FTP secrets (canonical names and common aliases)
          known+=(FTP_HOST FTP_USER FTP_PASS FTP_USERNAME FTP_PASSWORD)
          # SSH/path secrets for staging and production
          known+=(STAGING_HOST STAGING_USER STAGING_SSH_KEY STAGING_PATH STAGING_URL)
          known+=(STAGING_WP_URL STAGING_WP_USER STAGING_WP_APP_PASSWORD)
          known+=(PRODUCTION_HOST PRODUCTION_USER PRODUCTION_SSH_KEY PRODUCTION_PATH)
          # cPanel secrets
          known+=(CPANEL_TOKEN CPANEL_API_TOKEN CPANEL_HOST CPANEL_USER CPANEL_REPO)
          # WP REST API secrets (canonical names and common aliases)
          known+=(WP_REST_USER WP_REST_USERNAME WP_REST_PASS WP_REST_PASSWORD WP_SITE_URL)

          for k in "${known[@]}"; do
            if [ -z "${!k-}" ]; then
              echo "MISSING: $k" | tee -a artifacts/secret-check.txt
              missing=$((missing+1))
            else
              echo "OK: $k" | tee -a artifacts/secret-check.txt
            fi
          done

          if [ -n "${EXTRA_SECRETS}" ]; then
            IFS=',' read -ra extras <<< "${EXTRA_SECRETS}"
            for e in "${extras[@]}"; do
              e_trim=$(echo "$e" | xargs)
              if [ -z "${!e_trim-}" ]; then
                echo "MISSING: $e_trim" | tee -a artifacts/secret-check.txt
                missing=$((missing+1))
              else
                echo "OK: $e_trim" | tee -a artifacts/secret-check.txt
              fi
            done
          fi

          echo "missing=$missing" >> $GITHUB_OUTPUT
          echo "Summary: $missing missing" | tee -a artifacts/secret-check.txt

          if [ "$missing" -gt 0 ] && [ "${FAIL_ON_MISSING,,}" = "true" ]; then
            echo "One or more secrets are missing; failing as requested."
            exit 1
          fi

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-check-summary
          path: artifacts/secret-check.txt
