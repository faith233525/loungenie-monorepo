name: Unattended Full Sync (dry-run by default)

on:
  push:
    branches: [main, master, feature/staging-deploy]
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch: {}

jobs:
  dry_run:
    name: "Dry-run: generate artifacts"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dry-run orchestrator (PowerShell)
        shell: pwsh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: |
          Write-Host "Starting dry-run orchestrator"
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_wp_ftp_and_rest_safe.ps1 -DryRun

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-artifacts
          path: |
            artifacts/**
            logs/**

  live_apply:
    name: "Live apply (only when explicitly allowed)"
    runs-on: windows-latest
    needs: dry_run
    if: ${{ secrets.ALLOW_LIVE == 'true' && secrets.WP_PASS && secrets.FTP_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm live mode
        run: echo "ALLOW_LIVE=true and credentials present — running live apply"

      - name: Run live orchestrator (PowerShell)
        shell: pwsh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: |
          Write-Host "Starting live orchestrator"
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_wp_ftp_and_rest_safe.ps1 -Live

      - name: Upload live run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-orchestrator-artifacts
          path: |
            artifacts/**
            logs/**
