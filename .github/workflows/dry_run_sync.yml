name: Safe Dry-Run Staging Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no remote writes)"
        required: false
        default: "true"
      allow_live:
        description: "When true and secrets are set, allows live writes (must be manually set)"
        required: false
        default: "false"
      run_ftp_backup:
        description: "Run FTP backup step"
        required: false
        default: "true"
  push:
    branches:
      - feature/staging-deploy
  schedule:
    - cron: "0 3 * * 0" # weekly on Sunday at 03:00 UTC

jobs:
  dry-run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          MISSING=0
          for s in WP_URL WP_USER WP_APP_PASS FTP_HOST FTP_USER FTP_PASS; do
            if [ -z "${!s-}" ]; then
              echo "ERROR: secret $s is not set"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: Missing $MISSING required secrets. Exiting."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run safe orchestrator
        shell: bash
        env:
          RUN_FTP_BACKUP: ${{ github.event.inputs.run_ftp_backup }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ALLOW_LIVE: ${{ github.event.inputs.allow_live }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # Determine whether to enable live writes: user must set allow_live=true and all secrets must be present
          LIVE=false
          if [ "${ALLOW_LIVE}" = "true" ]; then
            if [ -n "${WP_APP_PASS}" ] && [ -n "${FTP_PASS}" ]; then
              echo "All secrets present and allow_live requested - enabling LIVE mode."
              LIVE=true
            else
              echo "allow_live requested but secrets missing - staying in dry-run."
            fi
          else
            echo "allow_live not set - running in dry-run (safe) mode."
          fi
          if [ "${LIVE}" = "true" ]; then
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_wp_ftp_and_rest_safe.ps1 -Live
          else
            pwsh -NoProfile -ExecutionPolicy Bypass -File .\tools\run_wp_ftp_and_rest_safe.ps1 -DryRun
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-artifacts
          path: |
            artifacts/duplicate_report.txt
            artifacts/media_uploads.json
            artifacts/image_audit.json
            run_wp_ftp_and_rest.log

      - name: Comment with artifact link
        run: echo "Dry-run finished — check uploaded artifacts in the workflow run artifacts."
