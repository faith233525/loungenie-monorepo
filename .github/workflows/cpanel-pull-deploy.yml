name: Deploy to cPanel (Git Pull) [standalone]

# Standalone Git-pull-only workflow — kept for manual use.
# The master deployment workflow (deploy-cpanel.yml) now handles
# Git pull + FTP + REST automatically on every push to main.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'cPanel repo name configured in cPanel (optional)'
        required: false
        default: ''

jobs:
  trigger-pull:
    runs-on: ubuntu-latest
    name: Trigger cPanel Git Pull
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Trigger cPanel Pull
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_HOSTNAME: cpanel.loungenie.com
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
          CPANEL_REPO: ${{ secrets.CPANEL_REPO }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
        run: |
          set -euo pipefail
          REPO="${INPUT_REPO:-${CPANEL_REPO}}"
          if [ -z "$REPO" ]; then
            echo "No repo specified (set CPANEL_REPO secret or pass repo input)." >&2
            exit 1
          fi
          source scripts/normalize_cpanel_host.sh
          HOST=$(normalize_cpanel_host "${CPANEL_HOST}" "${CPANEL_HOSTNAME}")
          URL="https://${HOST}:2083/execute/Git/update_repo?repo=${REPO}"
          echo "Triggering cPanel pull for repo: ${REPO} on host ${HOST}"
          HTTP=$(curl -s -w "%{http_code}" -o pull.json -X POST "$URL" \
            -H "Authorization: cpanel ${CPANEL_USER}:${CPANEL_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "cPanel response (first 200 chars):"
          head -c 200 pull.json || true
          echo ""
          echo "HTTP_STATUS:$HTTP"
          if [ "${HTTP}" -ge 400 ]; then
            echo "cPanel API returned error ${HTTP}" >&2; exit 1
          fi

      - name: Upload pull response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-pull-response
          path: pull.json
