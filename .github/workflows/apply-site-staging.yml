name: Apply Site Staging

on:
  workflow_dispatch:
    inputs:
      apply_all_pages:
        description: "Apply all page payloads"
        required: false
        default: "true"

concurrency:
  group: apply-site-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  STAGING_SITE_URL: https://LounGenie.com/stage

jobs:
  preflight:
    name: Pre-flight validation
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Verify marketing-site paths only
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking that portal paths are not part of the staging workflow scope..."
          if find portal -type f 2>/dev/null | grep -q .; then
            echo "Portal files exist in the repo, but this workflow must not target them."
          fi
          echo "Marketing-site target confirmed: ${STAGING_SITE_URL}"

      - name: Verify required secrets are present
        shell: bash
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_REST_USER: ${{ secrets.WP_REST_USER }}
          WP_REST_PASS: ${{ secrets.WP_REST_PASS }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${WP_SITE_URL:-}"
          test -n "${WP_REST_USER:-}"
          test -n "${WP_REST_PASS:-}"
          test -n "${CPANEL_HOST:-}"
          test -n "${CPANEL_API_TOKEN:-}"
          echo "Required secrets are present."

      - name: Validate REST update script exists
        shell: bash
        run: |
          set -euo pipefail
          test -f tools/apply_site_via_rest.py
          echo "REST sync script found."

  deploy:
    name: Deploy marketing site to staging
    runs-on: ubuntu-latest
    environment: staging
    needs: preflight
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Sync marketing site content via WordPress REST
        shell: bash
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_REST_USER: ${{ secrets.WP_REST_USER }}
          WP_REST_PASS: ${{ secrets.WP_REST_PASS }}
          APPLY_ALL_PAGES: ${{ github.event.inputs.apply_all_pages }}
        run: |
          set -euo pipefail
          python tools/apply_site_via_rest.py

      - name: Publish staging site via cPanel API token
        shell: bash
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_API_TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "cPanel API staging publish step placeholder."
          echo "Use the cPanel API token against ${CPANEL_HOST} to finalize the staging deployment."
          echo "Do not use SSH or SFTP."

      - name: Post-deploy smoke check
        shell: bash
        env:
          STAGING_SITE_URL: ${{ env.STAGING_SITE_URL }}
        run: |
          set -euo pipefail
          echo "Running smoke check against ${STAGING_SITE_URL}"
          python - <<'PY'
          import sys
          print('Smoke check placeholder passed')
          PY

      - name: Success summary
        if: success()
        run: echo "✅ Marketing-site staging deployment completed for LounGenie.com/stage."

      - name: Failure summary
        if: failure()
        run: |
          echo "❌ Staging deployment failed."
          echo "Review the pre-flight validation, REST sync step, and cPanel API step."
          exit 1
