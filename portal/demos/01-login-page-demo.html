<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LounGenie Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --lg-primary: #1CAAB6 !important;
            --lg-secondary: #67BED9 !important;
            --lg-success: #4DA88F !important;
            --lg-structure: #1A237E !important;
            --lg-text-primary: var(--lg-structure);
            --lg-bg-primary: #FFFFFF;
            --lg-bg-secondary: #F5F7FA;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--lg-primary) 0%, var(--lg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--lg-text-primary);
        }

        .login-container {
            background: var(--lg-bg-primary);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--lg-primary);
            margin-bottom: 10px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--lg-text-primary);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E8E8E8;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            color: var(--lg-text-primary);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--lg-primary);
            box-shadow: 0 0 0 3px rgba(28, 170, 182, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .role-option {
            position: relative;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-label {
            display: block;
            padding: 16px;
            border: 2px solid #E8E8E8;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 13px;
        }

        .role-option input[type="radio"]:checked + .role-label {
            border-color: var(--lg-primary);
            background-color: rgba(28, 170, 182, 0.1);
            color: var(--lg-primary);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-primary {
            background-color: var(--lg-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #189BA5;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(28, 170, 182, 0.3);
        }

        .btn-secondary {
            background-color: var(--lg-bg-secondary);
            color: var(--lg-text-primary);
            border: 2px solid #E8E8E8;
        }

        .btn-secondary:hover {
            border-color: var(--lg-primary);
            background-color: rgba(28, 170, 182, 0.05);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #E8E8E8;
        }

        .divider::before {
            margin-right: 10px;
        }

        .divider::after {
            margin-left: 10px;
        }

        .sso-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .sso-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 16px;
            border: 2px solid #E8E8E8;
            background-color: var(--lg-bg-primary);
            color: var(--lg-text-primary);
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .sso-btn:hover {
            border-color: var(--lg-primary);
            background-color: var(--lg-bg-secondary);
        }

        .sso-btn i {
            font-size: 16px;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            line-height: 1.6;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .alert.success {
            background-color: rgba(77, 168, 143, 0.1);
            color: var(--lg-success);
            display: block;
        }

        .alert.info {
            background-color: rgba(28, 170, 182, 0.1);
            color: var(--lg-primary);
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-water"></i> LounGenie
            </div>
            <div class="logo-subtitle">MyPOOLSAFE Partner Portal</div>
        </div>

        <div class="alert info">
            <i class="fas fa-info-circle"></i> Demo mode: Select a role and click "Login"
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Select Your Role</label>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="role-partner" name="role" value="partner" checked>
                        <label class="role-label" for="role-partner">
                            <i class="fas fa-building"></i><br>Partner
                        </label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="role-support" name="role" value="support">
                        <label class="role-label" for="role-support">
                            <i class="fas fa-headset"></i><br>Support
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="demo@example.com" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="demo123" placeholder="Enter your password">
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="resetForm()">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
        </form>

        <div class="divider">Or</div>

        <div class="sso-buttons">
            <button class="sso-btn" onclick="loginWithSSO('microsoft')">
                <i class="fab fa-microsoft"></i> Microsoft 365
            </button>
            <button class="sso-btn" onclick="loginWithSSO('google')">
                <i class="fab fa-google"></i> Google Workspace
            </button>
        </div>

        <div class="footer-text">
            <p>Demo credentials pre-filled. Click "Login" to enter.</p>
            <p style="margin-top: 10px; color: #666;">
                <i class="fas fa-lock"></i> Secure • Encrypted • GDPR Compliant
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            const email = document.getElementById('email').value;
            
            // Store in session and redirect
            sessionStorage.setItem('userRole', role);
            sessionStorage.setItem('userEmail', email);
            
            if (role === 'support') {
                window.location.href = '02-support-portal-demo.html';
            } else {
                window.location.href = '03-partner-portal-demo.html';
            }
        });

        function resetForm() {
            document.getElementById('loginForm').reset();
            document.getElementById('role-partner').checked = true;
        }

        function loginWithSSO(provider) {
            const role = document.querySelector('input[name="role"]:checked').value;
            sessionStorage.setItem('userRole', role);
            sessionStorage.setItem('ssoProvider', provider);
            
            if (role === 'support') {
                window.location.href = '02-support-portal-demo.html';
            } else {
                window.location.href = '03-partner-portal-demo.html';
            }
        }

        // Auto-fill demo credentials
        window.addEventListener('load', function() {
            document.getElementById('email').value = 'partner@poolsafe.com';
            document.getElementById('password').value = 'demo123';
        });
    </script>
</body>
</html>
